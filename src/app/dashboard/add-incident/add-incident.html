<header class="sticky top-0 z-20 bg-white border-b border-gray-200">
    <div class="flex items-center p-4">
        <button (click)="cancel()" class="text-gray-900 p-1 -ml-1 rounded-full hover:bg-gray-100 transition-colors">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <div class="ml-3">
            <h1 class="text-gray-900 text-lg font-bold leading-tight tracking-[-0.015em]">Nouvel incident</h1>
        </div>
    </div>
    <div class="px-4 pb-3">
        <nav class="flex text-xs font-medium text-gray-500 gap-1 items-center">
            <a [routerLink]="['/dashboard/incidents']"
                class="hover:text-primary transition-colors cursor-pointer">Incidents</a>
            <span class="material-symbols-outlined text-[14px]">chevron_right</span>
            <span class="text-primary">Nouvelle demande</span>
        </nav>
    </div>
</header>
<main class="flex-1 overflow-y-auto pb-32">
    <div class="max-w-xl mx-auto p-4 space-y-6">
        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 space-y-6">
            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-700" for="resident">Signalé par (Résident)</label>
                <select
                    class="w-full pl-4 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary appearance-none transition-all text-sm font-medium"
                    id="resident" [ngModel]="selectedResidentId()" (ngModelChange)="selectedResidentId.set($event)">
                    <option value="">Sélectionnez un résident</option>
                    <option *ngFor="let res of residents()" [value]="res.id">{{res.firstName}} {{res.lastName}}</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-gray-700" for="category">Catégorie</label>
                    <select
                        class="w-full pl-4 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary appearance-none transition-all text-sm font-medium"
                        id="category" [ngModel]="category()" (ngModelChange)="category.set($event)">
                        <option value="">Type d'incident</option>
                        <option *ngFor="let cat of categories" [value]="cat.value">{{cat.label}}</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-gray-700" for="priority">Priorité</label>
                    <select
                        class="w-full pl-4 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary appearance-none transition-all text-sm font-medium"
                        id="priority" [ngModel]="priority()" (ngModelChange)="priority.set($event)">
                        <option *ngFor="let prio of priorities" [value]="prio.value">{{prio.label}}</option>
                    </select>
                </div>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-700" for="title">Titre de l'incident</label>
                <input
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm outline-none"
                    id="title" placeholder="Bref résumé du problème" type="text" [ngModel]="title()"
                    (ngModelChange)="title.set($event)" />
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-700" for="location">Emplacement (Optionnel)</label>
                <input
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm outline-none"
                    id="location" placeholder="e.g., Couloir 2ème étage, Chambre principale" type="text"
                    [ngModel]="location()" (ngModelChange)="location.set($event)" />
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-700" for="description">Description détaillée</label>
                <textarea
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm outline-none resize-none"
                    id="description" placeholder="Décrivez l'incident de manière précise..." rows="4"
                    [ngModel]="description()" (ngModelChange)="description.set($event)"></textarea>
            </div>
            <div class="space-y-3">
                <label class="block text-sm font-bold text-gray-700">Pièces jointes</label>
                <div
                    class="border-2 border-dashed border-gray-200 rounded-2xl p-6 flex flex-col items-center justify-center bg-gray-50 group hover:border-primary/50 hover:bg-primary/5 transition-all">
                    <div
                        class="size-10 bg-white rounded-full flex items-center justify-center shadow-sm mb-2 text-primary">
                        <span class="material-symbols-outlined text-xl">cloud_upload</span>
                    </div>
                    <p class="text-xs font-bold text-gray-900 text-center">Cliquez ou déposez vos photos</p>
                    <p class="text-[10px] text-gray-500 mt-0.5">PNG, JPG jusqu'à 10MB</p>
                </div>
            </div>
        </div>
    </div>
</main>
<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 pb-12 lg:pb-8 z-30">
    <div class="max-w-xl mx-auto flex gap-3">
        <button
            class="flex-1 py-3 px-4 border border-gray-200 rounded-xl font-bold text-gray-600 hover:bg-gray-50 transition-colors text-sm"
            (click)="cancel()">
            Annuler
        </button>
        <button
            class="flex-[2] py-3 px-4 bg-primary text-white rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-primary/20 text-sm"
            (click)="submit()">
            Soumettre la demande
        </button>
    </div>
</div>
